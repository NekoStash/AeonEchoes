services:
  postgres:
    image: pgvector/pgvector:pg16
    profiles:
      - base
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aeon_echoes}
      POSTGRES_USER: ${POSTGRES_USER:-aeon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aeon_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.12.6
    profiles:
      - base
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    profiles:
      - app
    build:
      context: .
      dockerfile: infra/app.Dockerfile
      args:
        GOPROXY: ${GOPROXY:-https://proxy.golang.org,direct}
        GOSUMDB: ${GOSUMDB:-sum.golang.org}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,postgres,qdrant,fake-provider,app,web}
    env_file:
      - .env
    environment:
      AE_SERVER_HOST: 0.0.0.0
      AE_SERVER_PORT: 8080
      AE_POSTGRES_DSN: postgres://${POSTGRES_USER:-aeon}:${POSTGRES_PASSWORD:-aeon_dev_password}@postgres:5432/${POSTGRES_DB:-aeon_echoes}?sslmode=disable
      AE_QDRANT_URL: http://qdrant:6333
      AI_PROVIDER_BASE_URL: http://fake-provider:8787
      OPENAI_BASE_URL: http://fake-provider:8787/v1
      ANTHROPIC_BASE_URL: http://fake-provider:8787/anthropic
      GEMINI_BASE_URL: http://fake-provider:8787/gemini
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      fake-provider:
        condition: service_healthy
    restart: unless-stopped

  web:
    profiles:
      - app
      - web
    build:
      context: .
      dockerfile: infra/web.Dockerfile
      args:
        NUXT_PUBLIC_API_BASE: ${WEB_PUBLIC_API_BASE:-/api}
        YARN_NPM_REGISTRY_SERVER: ${YARN_NPM_REGISTRY_SERVER:-https://registry.npmjs.org}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,postgres,qdrant,fake-provider,app,web}
    ports:
      - "${WEB_PORT:-3000}:80"
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped

  fake-provider:
    build:
      context: ./infra/fake-provider
    profiles:
      - fake-ai
      - app
    environment:
      FAKE_PROVIDER_HOST: 0.0.0.0
      FAKE_PROVIDER_PORT: 8787
    ports:
      - "${FAKE_PROVIDER_PORT:-8787}:8787"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:8787/health').then(function(r){process.exit(r.ok?0:1)}).catch(function(){process.exit(1)})"
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
  qdrant-data:

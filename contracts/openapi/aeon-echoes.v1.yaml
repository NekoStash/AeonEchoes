      properties:
        workflow:
          $ref: '#/components/schemas/Workflow'
        context_pack:
          $ref: '#/components/schemas/ContextPack'
        chapter_version:
          $ref: '#/components/schemas/ChapterVersion'
        index_job:
          $ref: '#/components/schemas/IndexJob'
        index_freshness:
          $ref: '#/components/schemas/IndexFreshness'
        model_resolution:
          $ref: '#/components/schemas/ModelResolution'
        continuity_audit:
          $ref: '#/components/schemas/ContinuityAudit'
        tool_trace:
          type: array
          items:
            type: string
    ContextSelection:
      type: object
      additionalProperties: false
      properties:
        chapter_ids:
          type: array
          items:
            type: string
        character_ids:
          type: array
          items:
            type: string
        character_names:
          type: array
          items:
            type: string
        include_world_rules:
          type: boolean
    ContextPreviewRequest:
      type: object
      additionalProperties: false
      properties:
        chapter_id:
          type: string
        title:
          type: string
        brief:
          type: string
        prompt:
          type: string
        context_node_ids:
          type: array
          items:
            type: string
        context_selection:
          $ref: '#/components/schemas/ContextSelection'
        reference_selection:
          $ref: '#/components/schemas/ContextSelection'
        style_constraints:
          type: array
          items:
            type: string
        role:
          type: string
        token_budget:
          type: integer
    ChapterIdeaRequest:
      allOf:
        - $ref: '#/components/schemas/ContextPreviewRequest'
        - type: object
          properties:
            max_output_tokens:
              type: integer
    DraftRequest:
      allOf:
        - $ref: '#/components/schemas/ChapterIdeaRequest'
        - type: object
          properties:
            chapter_idea:
              type: string
            chapter_idea_workflow_id:
              type: string
    CharacterProfilesRequest:
      type: object
      additionalProperties: false
      properties:
        focus:
          type: string
        count:
          type: integer
        brief:
          type: string
        chapter_id:
          type: string
        context_node_ids:
          type: array
          items:
            type: string
        context_selection:
          $ref: '#/components/schemas/ContextSelection'
        max_output_tokens:
          type: integer
    GraphExpansionRequest:
      type: object
      additionalProperties: false
      required: [depth]
      properties:
        entity_ids:
          type: array
          uniqueItems: true
          items:
            type: string
            minLength: 1
        depth:
          type: integer
          minimum: 1
          maximum: 4
    SemanticSearchRequest:
      type: object
      additionalProperties: false
      properties:
        query:
          type: string
        project_id:
          type: string
        limit:
          type: integer
        filters:
          $ref: '#/components/schemas/StringMap'
    DeleteStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [deleted]
    AgentRunResult:
      type: object
      properties:
        run:
          $ref: '#/components/schemas/AgentRun'
        content:
          type: string
        tool_trace:
          type: array
          items:
            $ref: '#/components/schemas/ToolTrace'
        model_resolution:
          $ref: '#/components/schemas/ModelResolution'
    AgentRunStreamEvent:
      type: object
      description: >-
        Unified SSE business-event data object validated by the server before emission. Exactly one type-specific payload is allowed: run.started requires run; model.resolved requires model_resolution; tool.started and tool.completed require tool with matching status; content.delta requires a non-empty delta; run.completed requires the complete AgentRunResult in result; run.failed requires a non-empty error. Heartbeats are SSE comments and are not represented by this schema.
      additionalProperties: false
      required: [type, sequence, run_id]
      properties:
        type:
          type: string
          enum: [run.started, model.resolved, tool.started, tool.completed, content.delta, run.completed, run.failed]
        sequence:
          type: integer
          format: int64
          minimum: 1
        run_id:
          type: string
          minLength: 1
        delta:
          type: string
        run:
          $ref: '#/components/schemas/AgentRun'
        result:
          $ref: '#/components/schemas/AgentRunResult'
        model_resolution:
          $ref: '#/components/schemas/ModelResolution'
        tool:
          $ref: '#/components/schemas/AgentRunStreamTool'
        error:
          type: string
          minLength: 1
    AgentRunStreamTool:
      type: object
      description: Public tool lifecycle identity only. Tool arguments and results are intentionally excluded because they may contain secrets or manuscript content.
      additionalProperties: false
      required: [call_id, name, status]
      properties:
        call_id:
          type: string
          minLength: 1
        name:
          type: string
          minLength: 1
        status:
          type: string
          enum: [started, completed]
    SkillScanResult:
      type: object
      properties:
        source_id:
          type: string
        path:
          type: string
        created:
          type: integer
        updated:
          type: integer
        deleted:
          type: integer
        unchanged:
          type: integer
        errors:
          type: array
          items:
            type: string
        scanned_at:
          type: string
          format: date-time
    CharacterProfile:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        role:
          type: string
        desire:
          type: string
        wound:
          type: string
        secret:
          type: string
        summary:
          type: string
        metadata:
          $ref: '#/components/schemas/StringMap'
    StringMap:
      type: object
      additionalProperties:
        type: string
    ObjectMap:
      type: object
      additionalProperties: true

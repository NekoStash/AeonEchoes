openapi: 3.1.0
info:
  title: Aeon Echoes HTTP API
  version: 1.0.0
  description: Versioned v1 API. All successful responses use the {data, meta} envelope; list responses also include page.
servers:
  - url: /api/v1
    description: v1 API root
paths:
  /health:
    get:
      operationId: getHealth
      tags: [system]
      responses:
        '200':
          description: Service health.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthEnvelope'
  /system/status:
    get:
      operationId: getSystemStatus
      tags: [system]
      responses:
        '200':
          description: System status summary.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V1Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SystemStatus'
  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      responses:
        '200':
          description: Projects.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V1ListEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Project'
    post:
      operationId: createProject
      tags: [projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectSeed'
      responses:
        '201':
          description: Initialized project, story bible, and workflow.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V1Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/InitializeProject'
        '400':
          $ref: '#/components/responses/BadRequest'
  /projects/{projectID}:
    parameters:
      - $ref: '#/components/parameters/ProjectID'
    get:
      operationId: getProject
      tags: [projects]
      responses:
        '200':
          description: Project.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V1Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Project'
        '404':
          $ref: '#/components/responses/NotFound'
  /project-seed-optimizations:
    post:
      operationId: optimizeProjectSeed
      tags: [projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectSeed'
      responses:
        '200':
          description: Optimized seed.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V1Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ProjectSeed'
        '400':
          $ref: '#/components/responses/BadRequest'
  /projects/{projectID}/story-bibles/current:
    parameters:
      - $ref: '#/components/parameters/ProjectID'
    get:
      operationId: getCurrentStoryBible
      tags: [story-bibles]
      responses:
        '200':
          description: Current story bible.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V1Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/StoryBible'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{projectID}/story-bibles/{storyBibleID}:
    parameters:
      - $ref: '#/components/parameters/ProjectID'
      - $ref: '#/components/parameters/StoryBibleID'
    put:
      operationId: updateStoryBible
      tags: [story-bibles]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoryBible'
      responses:
        '200':
          description: Updated story bible.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V1Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/StoryBible'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{projectID}/story-bibles/{storyBibleID}/character-syncs:
    parameters:
      - $ref: '#/components/parameters/ProjectID'
      - $ref: '#/components/parameters/StoryBibleID'
    post:
      operationId: syncStoryBibleCharacters
      tags: [story-bibles]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CharacterSyncRequest'
      responses:
        '200':
          description: Character entities synchronized from story bible profiles.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V1Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CharacterSyncResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /projects/{projectID}/chapters:
    parameters:
      - $ref: '#/components/parameters/ProjectID'
    get:
      operationId: listChapters
      tags: [chapters]
      responses:
        '200':
          description: Chapters.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V1ListEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Chapter'
    post:
      operationId: createChapter
      tags: [chapters]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChapterRequest'
      responses:
        '201':
          description: Created chapter.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V1Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Chapter'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /projects/{projectID}/chapters/{chapterID}:
    parameters:
      - $ref: '#/components/parameters/ProjectID'
      - $ref: '#/components/parameters/ChapterID'
    get:
      operationId: getChapter
      tags: [chapters]
      responses:
        '200':
          description: Chapter.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V1Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Chapter'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateChapter
      tags: [chapters]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateChapterRequest'
      responses:
        '200':
          description: Updated chapter.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V1Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Chapter'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    patch:
      operationId: patchChapter
      tags: [chapters]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateChapterRequest'
      responses:
        '200':
          description: Patched chapter.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V1Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Chapter'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /projects/{projectID}/chapters/{chapterID}/versions:
    parameters:
      - $ref: '#/components/parameters/ProjectID'
      - $ref: '#/components/parameters/ChapterID'
    get:
      operationId: listChapterVersions
      tags: [chapter-versions]
      responses:
        '200':
          description: Chapter versions.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V1ListEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ChapterVersion'
    post:
      operationId: createChapterVersion
      tags: [chapter-versions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChapterVersionRequest'
      responses:
        '201':
          description: Saved chapter version and queued index job.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V1Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SaveChapterVersionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{projectID}/workflows:
    parameters:
      - $ref: '#/components/parameters/ProjectID'
    get:
      operationId: listProjectWorkflows
      tags: [workflows]
      responses:
        '200':
          description: Project workflows.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V1ListEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Workflow'
  /workflows/{id}:
    parameters:
      - $ref: '#/components/parameters/ID'
    get:
      operationId: getWorkflow
      tags: [workflows]
      responses:
        '200':
          description: Workflow.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V1Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Workflow'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{projectID}/context-previews:
    parameters:
      - $ref: '#/components/parameters/ProjectID'
    post:
      operationId: previewContextSelection
      tags: [generation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContextPreviewRequest'
      responses:
        '200':
          description: Context preview.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V1Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ContextPreviewResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /projects/{projectID}/chapters/{chapterID}/ideas:
    parameters:
      - $ref: '#/components/parameters/ProjectID'
      - $ref: '#/components/parameters/ChapterID'
    post:
      operationId: generateChapterIdea
      tags: [generation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChapterIdeaRequest'
      responses:
        '201':
          description: Chapter idea generation result.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V1Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ChapterIdeaResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /projects/{projectID}/chapters/{chapterID}/drafts:
    parameters:
      - $ref: '#/components/parameters/ProjectID'
      - $ref: '#/components/parameters/ChapterID'
    post:
      operationId: draftChapter
      tags: [generation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DraftRequest'
      responses:
        '201':
          description: Draft result.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V1Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DraftResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /projects/{projectID}/character-profiles:
    parameters:
      - $ref: '#/components/parameters/ProjectID'
    post:
      operationId: generateCharacterProfiles
      tags: [generation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CharacterProfilesRequest'
      responses:
        '201':
          description: Character profile generation result.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V1Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CharacterProfilesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /projects/{projectID}/graph/expansions:
    parameters:
      - $ref: '#/components/parameters/ProjectID'
    post:
      operationId: expandGraph
      tags: [graph]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GraphExpansionRequest'
      responses:
        '200':
          description: Graph expansion.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V1Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/GraphExpansion'
        '400':
          $ref: '#/components/responses/BadRequest'
  /projects/{projectID}/retrieval/semantic-searches:
    parameters:
      - $ref: '#/components/parameters/ProjectID'
    post:
      operationId: semanticSearch
      tags: [retrieval]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SemanticSearchRequest'
      responses:
        '200':
          description: Semantic search results.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V1Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SemanticSearchResult'
        '400':
          $ref: '#/components/responses/BadRequest'
  /providers:
    get:
      operationId: listProviders
      tags: [providers]
      responses:
        '200':
          description: Providers.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V1ListEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Provider'
    post:
      operationId: createProvider
      tags: [providers]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProviderRequest'
      responses:
        '201':
          description: Created provider.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V1Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Provider'
        '400':
          $ref: '#/components/responses/BadRequest'
  /providers/{id}:
    parameters:
      - $ref: '#/components/parameters/ID'
    get:
      operationId: getProvider
      tags: [providers]
      responses:
        '200':
          description: Provider.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V1Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Provider'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateProvider
      tags: [providers]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProviderRequest'
      responses:
        '200':
          description: Updated provider.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V1Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Provider'
        '400':
          $ref: '#/components/responses/BadRequest'
    delete:
      operationId: deleteProvider
      tags: [providers]
      responses:
        '200':
          description: Deleted marker.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V1Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DeleteStatus'
        '404':
          $ref: '#/components/responses/NotFound'
  /providers/{id}/model-refreshes:
    parameters:
      - $ref: '#/components/parameters/ID'
    post:
      operationId: refreshProviderModels
      tags: [providers, models]
      responses:
        '200':
          description: Refreshed model catalog.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V1Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ProviderModelRefresh'
        '400':
          $ref: '#/components/responses/BadRequest'
  /models:
    get:
      operationId: listModels
      tags: [models]
      parameters:
        - name: kind
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Models.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V1ListEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Model'
    post:
      operationId: createModel
      tags: [models]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModelRequest'
      responses:
        '201':
          description: Created model.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V1Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Model'
        '400':
          $ref: '#/components/responses/BadRequest'
  /models/{id}:
    parameters:
      - $ref: '#/components/parameters/ID'
    get:
      operationId: getModel
      tags: [models]
      responses:
        '200':
          description: Model.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V1Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Model'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateModel
      tags: [models]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModelRequest'
      responses:
        '200':
          description: Updated model.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V1Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Model'
        '400':
          $ref: '#/components/responses/BadRequest'
    delete:
      operationId: deleteModel
      tags: [models]
      responses:
        '200':
          description: Deleted marker.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V1Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DeleteStatus'
        '404':
          $ref: '#/components/responses/NotFound'
  /model-routing:
    get:
      operationId: getModelRouting
      tags: [models]
      responses:
        '200':
          description: Current model routing map.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V1Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ModelRouting'
    put:
      operationId: putModelRouting
      tags: [models]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModelRouting'
      responses:
        '200':
          description: Updated model routing map.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V1Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ModelRouting'
        '400':
          $ref: '#/components/responses/BadRequest'
  /agents:
    get:
      operationId: listAgents
      tags: [agents]
      description: When project_id is provided, returns the effective Agent scope for that project (project-specific plus global Agents), excluding Agents owned by other projects.
      parameters:
        - $ref: '#/components/parameters/AgentProjectIDQuery'
        - $ref: '#/components/parameters/EnabledQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Agent configurations.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V1ListEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Agent'
    post:
      operationId: createAgent
      tags: [agents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Agent'
      responses:
        '201':
          description: Created agent configuration.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V1Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Agent'
        '400':
          $ref: '#/components/responses/BadRequest'
  /agents/{id}:
    parameters:
      - $ref: '#/components/parameters/ID'
    get:
      operationId: getAgent
      tags: [agents]
      responses:
        '200':
          description: Agent configuration.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V1Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Agent'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateAgent
      tags: [agents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Agent'
      responses:
        '200':
          description: Updated agent configuration.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V1Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Agent'
        '400':
          $ref: '#/components/responses/BadRequest'
    delete:
      operationId: deleteAgent
      tags: [agents]
      responses:
        '200':
          description: Deleted marker.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V1Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DeleteStatus'
        '404':
          $ref: '#/components/responses/NotFound'
  /agents/{id}/runs:
    parameters:
      - $ref: '#/components/parameters/ID'
    post:
      operationId: runAgent
      tags: [agents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentRunRequest'
      responses:
        '201':
          description: Agent run result.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V1Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AgentRunResult'
        '400':
          $ref: '#/components/responses/BadRequest'
  /agents/{id}/runs/stream:
    parameters:
      - $ref: '#/components/parameters/ID'
    post:
      operationId: streamAgentRun
      tags: [agents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentRunRequest'
      responses:
        '200':
          description: >-
            Server-sent agent run events. Each business SSE event uses its type as the event name and serializes AgentRunStreamEvent as data. The server may also send `: heartbeat` comments, which are not business events and do not consume sequence numbers.
          content:
            text/event-stream:

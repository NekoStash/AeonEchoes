components:
  parameters:
    ID:
      name: id
      in: path
      required: true
      schema:
        type: string
    ProjectID:
      name: projectID
      in: path
      required: true
      schema:
        type: string
    StoryBibleID:
      name: storyBibleID
      in: path
      required: true
      schema:
        type: string
    ChapterID:
      name: chapterID
      in: path
      required: true
      schema:
        type: string
    ProjectIDQuery:
      name: project_id
      in: query
      schema:
        type: string
    AgentProjectIDQuery:
      name: project_id
      in: query
      description: Project whose effective Agent scope is requested. Matching project Agents and global Agents (null or empty project_id) are returned; other projects are excluded.
      schema:
        type: string
    EnabledQuery:
      name: enabled
      in: query
      schema:
        type: boolean
    LimitQuery:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
  responses:
    BadRequest:
      description: Invalid request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Conflict:
      description: Resource state conflicts with the request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    ServerError:
      description: Server error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    ServiceUnavailable:
      description: Service unavailable.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    V1Envelope:
      type: object
      required: [data, meta]
      properties:
        data:
          description: Endpoint-specific payload.
        meta:
          $ref: '#/components/schemas/Meta'
    V1ListEnvelope:
      allOf:
        - $ref: '#/components/schemas/V1Envelope'
        - type: object
          required: [page]
          properties:
            page:
              $ref: '#/components/schemas/Page'
    Meta:
      type: object
      required: [request_id]
      properties:
        request_id:
          type: string
    Page:
      type: object
      required: [count]
      properties:
        count:
          type: integer
        limit:
          type: integer
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/APIError'
    APIError:
      type: object
      required: [code, message, status, request_id]
      properties:
        code:
          type: string
        message:
          type: string
        status:
          type: integer
        request_id:
          type: string
        details:
          description: Endpoint-specific error details.
    HealthEnvelope:
      allOf:
        - $ref: '#/components/schemas/V1Envelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/Health'
    Health:
      type: object
      required: [status, time, qdrant_configured, postgres_configured]
      properties:
        status:
          type: string
          example: ok
        time:
          type: string
          format: date-time
        qdrant_configured:
          type: boolean
        postgres_configured:
          type: boolean
    SystemStatus:
      type: object
      properties:
        status:
          type: string
        postgres_configured:
          type: boolean
        qdrant_configured:
          type: boolean
        provider_count:
          type: integer
        model_count:
          type: integer
        pending_jobs_count:
          type: integer
        checked_at:
          type: string
          format: date-time
    ProjectSeed:
      type: object
      required: [title, premise]
      additionalProperties: false
      properties:
        title:
          type: string
        premise:
          type: string
        genre:
          type: string
        tone:
          type: string
        audience:
          type: string
        language:
          type: string
        setting:
          type: string
        themes:
          type: array
          items:
            type: string
        main_characters:
          type: array
          items:
            type: string
        constraints:
          type: array
          items:
            type: string
        target_chapters:
          type: integer
        metadata:
          $ref: '#/components/schemas/StringMap'
    Project:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        slug:
          type: string
        status:
          type: string
        seed:
          $ref: '#/components/schemas/ProjectSeed'
        active_story_bible_id:
          type: string
        default_worldline_id:
          type: string
        metadata:
          $ref: '#/components/schemas/StringMap'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    InitializeProject:
      type: object
      properties:
        project:
          $ref: '#/components/schemas/Project'
        story_bible:
          $ref: '#/components/schemas/StoryBible'
        workflow:
          $ref: '#/components/schemas/Workflow'
    StoryBible:
      type: object
      properties:
        id:
          type: string
        project_id:
          type: string
        version:
          type: integer
        title:
          type: string
        logline:
          type: string
        synopsis:
          type: string
        genre:
          type: string
        tone:
          type: string
        audience:
          type: string
        language:
          type: string
        premise:
          type: string
        themes:
          type: array
          items:
            type: string
        world_rules:
          type: array
          items:
            type: string
        characters:
          type: array
          items:
            $ref: '#/components/schemas/StoryBibleCharacter'
        foreshadows:
          type: array
          items:
            $ref: '#/components/schemas/StoryBibleForeshadow'
        chapter_plan:
          type: array
          items:
            $ref: '#/components/schemas/StoryBibleChapterPlan'
        source_seed:
          $ref: '#/components/schemas/ProjectSeed'
        rules:
          $ref: '#/components/schemas/StringMap'
        worldline_ids:
          type: array
          items:
            type: string
        entity_ids:
          type: array
          items:
            type: string
        plot_thread_ids:
          type: array
          items:
            type: string
        genesis_workflow_id:
          type: string
        approved:
          type: boolean
        created_at:
          type: string
          format: date-time
    StoryBibleCharacter:
      type: object
      required: [name]
      additionalProperties: false
      properties:
        id:
          type: string
        name:
          type: string
        role:
          type: string
        desire:
          type: string
        wound:
          type: string
        secret:
          type: string
        summary:
          type: string
        entity_id:
          type: string
        sync_status:
          type: string
        synced_at:
          type: string
        metadata:
          $ref: '#/components/schemas/StringMap'

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aeon_echoes}
      POSTGRES_USER: ${POSTGRES_USER:-aeon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.12.6
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    image: ghcr.io/nekostash/aeonechoes/app:${AEON_ECHOES_TAG:-latest}
    env_file:
      - .env
    environment:
      AE_SERVER_HOST: 0.0.0.0
      AE_SERVER_PORT: 8080
      AE_POSTGRES_DSN: postgres://${POSTGRES_USER:-aeon}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-aeon_echoes}?sslmode=disable
      AE_QDRANT_URL: http://qdrant:6333
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped

  web:
    image: ghcr.io/nekostash/aeonechoes/web:${AEON_ECHOES_TAG:-latest}
    ports:
      - "${WEB_PORT:-3000}:80"
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres-data:
  qdrant-data:
